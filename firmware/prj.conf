# ---------------------------------------------------------------- Bluetooth
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="JRWatch"
CONFIG_BT_DEVICE_APPEARANCE=192
CONFIG_BT_BAS=y
CONFIG_BT_SMP=y
CONFIG_BT_SETTINGS=y
# connection interval: prefer long intervals for power (units of 1.25 ms)
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=40
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=80
CONFIG_BT_PERIPHERAL_PREF_LATENCY=4
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=y

# settings/bonding storage
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# ------------------------------------------------------------------ devices
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_SPI=y
CONFIG_SENSOR=y
CONFIG_REGULATOR=y
CONFIG_MFD=y
CONFIG_INPUT=y

# BMI270 (SPI) with motion trigger for wake-on-wrist
CONFIG_BMI270=y
CONFIG_BMI270_TRIGGER_OWN_THREAD=y

# Sharp memory-in-pixel display
CONFIG_DISPLAY=y
CONFIG_LS0XX=y
CONFIG_CHARACTER_FRAMEBUFFER=y

# ------------------------------------------------------------- power story
CONFIG_PM=y
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y
CONFIG_POWEROFF=y


# ---------------------------------------------------------------- logging
# no UART pins on this board: console/logs over SEGGER RTT (SWD attached)
CONFIG_LOG=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_DEFAULT_LEVEL=3

CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=4096
