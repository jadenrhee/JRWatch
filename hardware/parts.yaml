    alt_source: DigiKey NPM1300-QEAA-R7 $2.95 (ships today)
    footprint: Package_DFN_QFN:VQFN-32-1EP_5x5mm_P0.5mm_EP3.5x3.5mm_ThermalVias  # EP 3.5mm nom per PS mech spec
