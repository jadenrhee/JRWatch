    desc: BLE module, nRF52840, chip antenna, BT5 certified (FCC/CE/TELEC)
    lcsc: C5118826
    lcsc_stock: 0            # listed, out of stock 2026-07-02
    alt_source: DigiKey MDBT50Q-1MV2 (ships today, ~$8) ; P1MV2 (C5119772) footprint-identical
    footprint: RF_Module:Raytac_MDBT50Q
    sourcing: hand
    datasheet: datasheets/mdbt50q-1mv2.pdf (Ver.K)
  U2:
    mpn: nPM1300-QEAA-R7
    mfr: Nordic Semiconductor
    desc: PMIC — linear LiPo charger, 2x buck, 2x LDO/loadswitch, fuel gauge, USB-C CC, ship mode
