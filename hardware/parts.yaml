# JRWatch master parts database — single source of truth for SKiDL, BOM, and CPL.
# stock figures checked on LCSC 2026-07-02 (design time). basic/extended per JLCPCB
# at order time. sourcing: "jlc" = economic SMT assembly, "hand" = hand-place
# (reflow/hot air), module castellations iron-solderable.

parts:
